<script>
(function(){
  var trigger = document.getElementById('btu-sidebar-trigger');
  var sidebar = document.getElementById('btu-sidebar');
  var open = false;
  var timer = null;

  function openSidebar(){ open=true; sidebar.classList.add('open'); }
  function closeSidebar(){ open=false; sidebar.classList.remove('open'); }

  trigger.addEventListener('mouseenter', openSidebar);
  sidebar.addEventListener('mouseleave', function(){ timer=setTimeout(closeSidebar, 200); });
  sidebar.addEventListener('mouseenter', function(){ clearTimeout(timer); });
  trigger.addEventListener('mouseleave', function(){ timer=setTimeout(closeSidebar, 200); });

  // Kategorien dynamisch befьllen wenn React geladen ist
  function populateCats(){
    var list = document.getElementById('btu-cat-list');
    if(!list) return;
    // Suche React-Fiber um an activeCategory zu kommen
    var btns = document.querySelectorAll('button');
    var catBtns = [];
    btns.forEach(function(b){
      var fk = Object.keys(b).find(function(k){ return k.startsWith('__reactFiber'); });
      if(!fk) return;
      var props = b[fk] && b[fk].memoizedProps;
      if(props && props.onClick && b.textContent.trim() === 'Alle') {
        // gefunden - navigiere hoch zum Container mit allen Kategorien
      }
    });
    // Einfacher: finde alle Buttons in der zweiten Scrollbar (Kategorie-Leiste)
    var allCatBtns = [];
    btns.forEach(function(b){
      var fk = Object.keys(b).find(function(k){ return k.startsWith('__reactFiber'); });
      if(!fk) return;
      var fiber = b[fk];
      var onClick = fiber && fiber.memoizedProps && fiber.memoizedProps.onClick;
      if(onClick && onClick.toString().includes('setActiveCategory')) {
        allCatBtns.push(b);
      }
    });
    if(allCatBtns.length === 0) return;
    list.innerHTML = '';
    allCatBtns.forEach(function(btn){
      var item = document.createElement('div');
      item.className = 'btu-cat-item' + (btn.style.background === 'rgb(200, 16, 46)' ? ' active' : '');
      item.textContent = btn.textContent.trim();
      item.addEventListener('click', function(){
        btn.click();
        closeSidebar();
      });
      list.appendChild(item);
    });
  }

  // Warte bis React gerendert hat, dann befьllen
  setTimeout(populateCats, 1500);
  // Und bei jedem Цffnen aktualisieren
  trigger.addEventListener('mouseenter', function(){ setTimeout(populateCats, 50); });
})();
</script>

function getGoalScore(p, goal) {
  let score = (GOAL_CAT_SCORES[goal] || {})[p.category] || 0;
  const allText = [p.name, p.subcategory, p.notes || "", ...(p.keyIngredients || []), p.flavors || ""].join(" ").toLowerCase();
  for (const kw of (GOAL_KEYWORDS[goal] || [])) {
    if (allText.includes(kw)) score = Math.min(score + 18, 100);
  }
  if (goal === "vegan") {
    const freeText = (p.freeFrom || []).join(" ").toLowerCase();
    if (allText.includes("vegan")) score += 90;
    else if (freeText.includes("laktose") && freeText.includes("gluten")) score += 40;
  }
  return Math.min(score, 100);
}

function strHash(str) {
  let h = 0;
  for (let i = 0; i < Math.min(str.length, 120); i++) {
    h = (h * 31 + str.charCodeAt(i)) >>> 0;
  }
  return h.toString(36);
}

// в”Җв”Җ Phrase-Substitution Funktion в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// Ersetzt alle bekannten deutschen Begriffe in einem Text (lГӨngste zuerst)
function translateFieldSync(text, lang) {
  if (!text || lang === "de") return text;
  const dict = DICT[lang];
  if (!dict) return text;
  // Sort by key length descending: longer phrases replace before shorter words.
  const entries = Object.entries(dict).sort((a, b) => b[0].length - a[0].length);
  let result = text;
  const placeholders = [];
  // Marker unlikely to appear in real text
  const M = "\x07";

  for (const [de, tx] of entries) {
    if (!result.includes(de)) continue;
    const ph = M + placeholders.length + M;
    placeholders.push(tx);
    // Short pure-letter keys: use word boundaries to avoid substring matches
    if (/^[A-Za-z\u00C0-\u017E]+$/.test(de) && de.length <= 8) {
      const esc = de.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      result = result.replace(
        new RegExp("(?<![A-Za-z\\u00C0-\\u017E])" + esc + "(?![A-Za-z\\u00C0-\\u017E])", "g"),
        ph
      );
    } else {
      result = result.split(de).join(ph);
    }
  }
  // Restore all placeholders
  return result.replace(new RegExp(M + "(\\d+)" + M, "g"), (_, i) => placeholders[+i]);
}

function translateArraySync(arr, lang) {
  if (!arr || lang === "de") return arr;
  return arr.map(item => translateFieldSync(String(item), lang));
}

// в”Җв”Җ Synchrone Produkt-Гңbersetzung (kein API-Call mehr) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function getProductTx(lang, product) {
  if (!product || lang === "de") return null;
  return {
    subcategory: translateFieldSync(product.subcategory, lang),
    notes: translateFieldSync(product.notes, lang),
    dosage: translateFieldSync(product.dosage, lang),
    flavors: translateFieldSync(product.flavors, lang),
    bcaa: translateFieldSync(product.bcaa, lang),
    warning: translateFieldSync(product.warning, lang),
    freeFrom: translateArraySync(product.freeFrom, lang),
    keyIngredients: translateArraySync(product.keyIngredients, lang),
    studies: (product.studies || []).map(s => ({
      ...s,
      finding: translateFieldSync(s.finding, lang),
    })),
    objections: (OBJECTIONS[product.id] || []).map(o => ({
      q: translateFieldSync(o.q, lang),
      a: translateFieldSync(o.a, lang),
    })),
  };
}

// Hook: gibt Гјbersetzte Produktfelder zurГјck (synchron, kein Loading-State mehr)
function useProductTx(lang, product) {
  return React.useMemo(() => getProductTx(lang, product), [lang, product?.id]);
}

// в”Җв”Җ Einfache UI-Strings Гјbersetzen в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function useTx(lang, text) {
  if (!text || lang === "de") return text;
  return translateFieldSync(text, lang);
}

function Tx({ lang, text, style, as: Tag = "span", className }) {
  const translated = useTx(lang, text);
  if (!text) return null;
  return React.createElement(Tag, { style, className }, translated || text);
}

  if (range === "вӮ¬вӮ¬")  return { label: "Advanced",  bg: "#fef3c7", color: "#92400e", border: "#fcd34d" };
                       return { label: "Premium",   bg: "#fee2e2", color: "#991b1b", border: "#fca5a5" };
}

function stackPriceInfo(goalKey) {
  const combo = GOAL_COMBOS[goalKey];
  if (!combo) return null;
  const total = combo.stack.reduce((sum, s) => {
    const p = PRODUCTS.find(x => x.id === s.id);
    return sum + (p && p.price ? p.price : 0);
  }, 0);
  if (total < 58)  return { total, label: "Basic-Stack",   bg: "#d1fae5", color: "#065f46", border: "#6ee7b7" };
  if (total < 90)  return { total, label: "Advanced-Stack", bg: "#fef3c7", color: "#92400e", border: "#fcd34d" };
                   return { total, label: "Premium-Stack",  bg: "#fee2e2", color: "#991b1b", border: "#fca5a5" };
}

  // в”Җв”Җ BMI / TDEE CALC в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  function calcBMI() {
    var wMap = {'<60kg':57,'60-75kg':67,'75-90kg':82,'90+kg':95};
    var hMap = {'<150cm':148,'150-165cm':157,'165-175cm':170,'175-185cm':180,'185+cm':188};
    var aMap = {'16-20':18,'20-30':25,'30-40':35,'40-50':45,'50+':55};
    var actMap = {'1-2x':1.375,'3-4x':1.55,'5-6x':1.725,'daily':1.9};
    var w = wMap[(answers.weight||['75-90kg'])[0]] || 80;
    var h = hMap[(answers.height||['175-185cm'])[0]] || 178;
    var a = aMap[(answers.age||['20-30'])[0]] || 28;
    var g = (answers.gender||['male'])[0];
    var freq = actMap[(answers.trainingFrequency||['3-4x'])[0]] || 1.55;
    var bmi = Math.round((w / ((h/100)*(h/100)))*10)/10;
    var bmiCat = bmi < 18.5 ? (lang==='en'?'Underweight':'Untergewicht')
               : bmi < 25   ? (lang==='en'?'Normal weight':'Normalgewicht')
               : bmi < 30   ? (lang==='en'?'Overweight':'Гңbergewicht')
               :               (lang==='en'?'Obese':'Adipositas');
    var bmr = g === 'female'
      ? Math.round(10*w + 6.25*h - 5*a - 161)
      : Math.round(10*w + 6.25*h - 5*a + 5);
    var tdee = Math.round(bmr * freq);
    var goals = answers.sportsGoal || [];
    var hasFatLoss = goals.indexOf('fatLoss') >= 0 || goals.indexOf('definition') >= 0;
    var hasMuscle  = goals.indexOf('muscleBuilding') >= 0 || goals.indexOf('strength') >= 0;
    return { w:w, h:h, a:a, bmi:bmi, bmiCat:bmiCat, bmr:bmr, tdee:tdee,
             fatKcal: tdee - 500, muscleKcal: tdee + 300,
             hasFatLoss:hasFatLoss, hasMuscle:hasMuscle };

  function calcMacros(data) {
    var kcal = data.hasMuscle ? data.muscleKcal : data.hasFatLoss ? data.fatKcal : data.tdee;

    var protKcal = protG * 4;
    var fatKcal  = Math.round(kcal * 0.28);

  // в”Җв”Җ SCORING в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  function calcResults() {

      if (allergies.indexOf('nuts') >= 0 && ff.indexOf('NГјsse') < 0) return false;

      var isClear   = sub.indexOf('clear')>=0 || sub.indexOf('fruchtig')>=0;
      var isKonz    = sub.indexOf('konzentrat')>=0 && sub.indexOf('isolat')<0;
      var isCasein  = sub.indexOf('casein')>=0;
      var isBeef    = sub.indexOf('rindfleisch')>=0 || sub.indexOf('beef')>=0;

      var isEAA     = sub.indexOf('eaa')>=0 || sub.indexOf('essenziell')>=0;

        if (hasMuscleGoal && isCarni) score-=0.1;

      if (p.category === 'Fettverbrenner' || p.category === 'Gewichtsmanagement') {

                          background:isSel?'#f0f0f0':'#fafafa',
                          border:isSel?'2px solid #222':'2px solid #e0e0e0',
                          borderRadius:8,cursor:'pointer',fontFamily:PFONT,textAlign:'center'}

                        CE('div',{style:{fontWeight:700,fontSize:12,color:'#111'}},v.packageSize||''),

                      );

            );

          // в”Җв”Җ Ihre Daten в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
          CE('div',{style:Object.assign({},CARD,{marginTop:4})},
            CE('div',{style:{fontWeight:700,fontSize:13,marginBottom:8}},lang==='en'?'Your Data':'Ihre Daten'),
            [
              [lang==='en'?'Gender':'Geschlecht', genderLbl],
              [lang==='en'?'Age':'Alter', ageLbl||'-'],
              ['BMI', bmiData.bmi],
              [lang==='en'?'Category':'Kategorie', bmiData.bmiCat]
            ].map(function(row,i){
              return CE('div',{key:i,style:{display:'flex',justifyContent:'space-between',padding:'4px 0',borderBottom:i<3?'1px solid #f0f0f0':'none'}},
                CE('span',{style:{fontSize:12,color:'#666'}},row[0]+':'),
                CE('span',{style:{fontSize:12,fontWeight:600,color:'#111'}},String(row[1]))
              );
            }),
            CE('div',{style:{marginTop:10,fontWeight:700,fontSize:12,marginBottom:6}},lang==='en'?'Calorie Recommendation':'Kalorienempfehlung'),
            [
              [lang==='en'?'Basal Metabolic Rate':'Grundumsatz (BMR)', bmiData.bmr+' kcal','#555'],
              [lang==='en'?'Daily Expenditure':'Tagesbedarf (TDEE)', bmiData.tdee+' kcal','#555'],
              [lang==='en'?'For Fat Loss:':'FГјr Fettabbau:', bmiData.fatKcal+' kcal','#27ae60'],
              [lang==='en'?'For Muscle Building:':'FГјr Muskelaufbau:', bmiData.muscleKcal+' kcal','#2980b9']
            ].map(function(row,i){
              return CE('div',{key:i,style:{display:'flex',justifyContent:'space-between',padding:'3px 0'}},
                CE('span',{style:{fontSize:12,color:i>1?row[2]:'#666',fontWeight:i>1?700:400}},row[0]),
                CE('span',{style:{fontSize:12,fontWeight:700,color:row[2]}},row[1])
              );
            })
          ),

          // в”Җв”Җ Makros в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
          CE('div',{style:CARD},
            CE('div',{style:{fontWeight:700,fontSize:13,marginBottom:8}},
              (lang==='en'?'Macronutrients':'MakronГӨhrstoffe')+' ('+macros.kcal+' kcal)'
            ),
            CE('div',{style:{display:'flex',justifyContent:'center',marginBottom:10}}, PieChart(macros)),
            [
              [lang==='en'?'Protein':'Protein',macros.protG+'g',macros.protPct+'%','#4A90D9'],
              [lang==='en'?'Carbohydrates':'Kohlenhydrate',macros.carbG+'g',macros.carbPct+'%','#2ECC71'],
              [lang==='en'?'Fats':'Fette',macros.fatG+'g',macros.fatPct+'%','#F5A623']
            ].map(function(row,i){
              return CE('div',{key:i,style:{display:'flex',alignItems:'center',gap:8,padding:'3px 0'}},
                CE('div',{style:{width:10,height:10,borderRadius:'50%',background:row[3],flexShrink:0}}),
                CE('span',{style:{flex:1,fontSize:12,color:'#444'}},row[0]),
                CE('span',{style:{fontSize:12,fontWeight:700,color:'#111',marginRight:8}},row[1]),
                CE('span',{style:{fontSize:11,color:'#888'}},row[2])
              );
            }),
            CE('div',{style:{marginTop:10,fontWeight:700,fontSize:12,color:'#111',marginBottom:4}},'Produkt-Scores'),
            results.map(function(candidates,i){
              var cur = candidates.filter(function(c){ return !dismissed[c.id]; })[0];
              if (!cur) return null;
              return CE('div',{key:i,style:{display:'flex',justifyContent:'space-between',padding:'2px 0'}},
                CE('span',{style:{fontSize:11,color:'#555'}},cur.name),
                CE('span',{style:{fontSize:11,fontWeight:700,color:'#333'}},(Math.round(cur._score*100)/100).toFixed(2))
              );
            })
          ),

          CE('div',{style:{display:'flex',gap:10,justifyContent:'center',marginTop:6}},
            CE('button',{onClick:handleRestart,style:{background:'#f0f0f0',border:'none',borderRadius:20,padding:'9px 20px',cursor:'pointer',fontFamily:PFONT,fontSize:12}},tDict.restart),
            CE('button',{onClick:onClose,style:{background:PRED,color:'#fff',border:'none',borderRadius:20,padding:'9px 22px',cursor:'pointer',fontFamily:PFONT,fontSize:12,fontWeight:700}},tDict.close)
          )
        )
      )
    );
  }

  // в”Җв”Җ QUIZ VIEW в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  var progress = (step / total) * 100;

  return CE('div',{style:OVERLAY,onClick:function(e){if(e.target===e.currentTarget)onClose();}},
    CE('div',{style:Object.assign({},MODAL,{background:'#fff'}),
    },
      CE('div',{style:HDR},
        CE('span',{style:{fontWeight:700,fontSize:15}},tDict.title),
        xBtn()
      ),
      CE('div',{style:{height:4,background:'#f0f0f0'}},
        CE('div',{style:{height:4,width:progress+'%',background:PRED,transition:'width 0.3s'}})
      ),
      CE('div',{style:{padding:'10px 20px 2px',fontSize:11,color:'#999'}},
        tDict.step+' '+(step+1)+' '+tDict.of+' '+total
      ),
      CE('div',{style:{padding:'4px 20px 10px',fontWeight:700,fontSize:15,color:'#111',lineHeight:1.3}},
        currentQ ? (currentQ.question[lang] || currentQ.question.de) : ''
      ),
      CE('div',{style:{padding:'0 14px 6px'}},
        currentQ ? currentQ.options.map(function(opt){
          var isSelected = sel.indexOf(opt.id) >= 0;
          return CE('button',{
            key:opt.id,
            onClick:function(){ toggleAnswer(currentQ.id,opt.id,currentQ.allowMultiple); },
            style:{
              display:'block',width:'100%',textAlign:'left',
              padding:'10px 16px',margin:'5px 0',
              background:isSelected?PRED:'#f7f7f7',
              color:isSelected?'#fff':'#222',
              border:isSelected?'2px solid '+PRED:'2px solid #e8e8e8',
              borderRadius:10,cursor:'pointer',fontFamily:PFONT,
              fontSize:13,fontWeight:isSelected?700:400,transition:'all 0.12s'
            }
          }, opt.label[lang] || opt.label.de);
        }) : []
      ),
      CE('div',{style:{padding:'8px 16px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}},
        step > 0
          ? CE('button',{onClick:goBack,style:{background:'#f0f0f0',border:'none',borderRadius:20,padding:'8px 18px',cursor:'pointer',fontFamily:PFONT,fontSize:12}},tDict.back)
          : CE('span',{}),
        CE('div',{style:{display:'flex',gap:8,alignItems:'center'}},
          CE('button',{onClick:goSkip,style:{background:'none',border:'none',color:'#aaa',cursor:'pointer',fontFamily:PFONT,fontSize:11,padding:'4px 8px'}},tDict.skip),
          CE('button',{
            onClick:goNext,
            disabled:!canProceed(),
            style:{
              background:canProceed()?PRED:'#ccc',
              color:'#fff',border:'none',borderRadius:20,
              padding:'9px 24px',cursor:canProceed()?'pointer':'default',
              fontFamily:PFONT,fontSize:13,fontWeight:700,transition:'background 0.15s'
            }
          }, step < total-1 ? tDict.next : tDict.results)
        )
      )
    )
  );
}

function AdminPanel({
  t, lang, FONT, FONT_COND, onDeleteAll, onLeave, productCount
}) {
  const [tab, setTab]               = React.useState("users");
  const [users, setUsers]           = React.useState([]);
  const [expandedUser, setExpanded] = React.useState(null);
  const [tick, setTick]             = React.useState(0);
  const [createFirst, setCreateFirst] = React.useState("");
  const [createLast,  setCreateLast]  = React.useState("");
  const [createMsg,   setCreateMsg]   = React.useState("");
  const [edSearch,    setEdSearch]    = React.useState("");
  const [editingId,   setEditingId]   = React.useState(null);
  const [editFields,  setEditFields]  = React.useState({});
  const [savedMsg,    setSavedMsg]    = React.useState("");
  const [editingUserId, setEditingUserId] = React.useState(null);
  const [editUserFields, setEditUserFields] = React.useState({ first: "", last: "" });
  const [editUserMsg, setEditUserMsg] = React.useState("");
  const EMPTY_PROD = { name:"", category:"Protein", categoryCustom:"", subcategory:"", price:"", packageSize:"", portionSize:"", kcalPortion:"", proteinPortion:"", fatPortion:"", carbsPortion:"", vegan:false, notes:"", flavors:"" };
  const [newProdOpen, setNewProdOpen] = React.useState(false);
  const [newProd, setNewProd] = React.useState(EMPTY_PROD);
  const [newProdMsg, setNewProdMsg] = React.useState("");
  const [customProds, setCustomProds] = React.useState(() => { try { return JSON.parse(localStorage.getItem("btu_custom_products")||"[]"); } catch { return []; } });
  const [customTick, setCustomTick] = React.useState(0);
  const [overrides,   setOverrides]   = React.useState(() => {
    try { return JSON.parse(localStorage.getItem("btu_product_overrides") || "{}"); } catch { return {}; }
  });

  const loadUsers = () => {
    // Primary: load from Supabase
    Promise.all([
      SB.get("profiles?select=id,first_name,last_name&order=first_name"),
      SB.get("favorites?select=profile_id,product_ids"),
      SB.get("quiz_results?select=profile_id,best_pct,last_pct,count,history")
    ]).then(([profiles, favRows, quizRows]) => {
      if (profiles && profiles.length > 0) {
        const list = profiles.map(p => {
          const favRow  = favRows  && favRows.find(f => f.profile_id === p.id);
          const quizRow = quizRows && quizRows.find(q => q.profile_id === p.id);
          const favs = (favRow && Array.isArray(favRow.product_ids)) ? favRow.product_ids : [];
          const quiz = quizRow ? { best: quizRow.best_pct, last: quizRow.last_pct, count: quizRow.count } : null;
          const hist = (quizRow && Array.isArray(quizRow.history)) ? quizRow.history : [];
          const fn = p.first_name || "";
          const ln = p.last_name  || "";
          return { key: p.id, displayName: (fn + " " + ln).trim() || p.id, firstName: fn, lastName: ln, favs, quiz, hist };
        });
        setUsers(list);
        return;
      }
      // Fallback: localStorage scan
      loadUsersLocal();
    }).catch(() => loadUsersLocal());
  };

  const loadUsersLocal = () => {
    try {
      const favKeys = Object.keys(localStorage).filter(k => k.startsWith("btu_favs_"));
      const list = favKeys.map(fk => {
        const key   = fk.replace("btu_favs_", "");
        const favs  = JSON.parse(localStorage.getItem(fk) || "[]");
        const quiz  = JSON.parse(localStorage.getItem("btu_quiz_" + key) || "null");
        const hist  = JSON.parse(localStorage.getItem("btu_quiz_hist_" + key) || "[]");
        const parts = key.split("_");
        const fn = parts[0] ? parts[0][0].toUpperCase() + parts[0].slice(1) : "";
        const ln = parts.slice(1).map(p => p[0].toUpperCase() + p.slice(1)).join(" ");
        return { key, displayName:(fn+" "+ln).trim()||key, firstName:fn, lastName:ln, favs, quiz, hist };
      });
      try {
        const cu = JSON.parse(localStorage.getItem("btu_user")||"null");
        if (cu && cu.key && !list.find(u=>u.key===cu.key)) {
          list.push({ key:cu.key, displayName:(cu.first+" "+cu.last).trim(),
            firstName:cu.first, lastName:cu.last, favs:[],
            quiz:JSON.parse(localStorage.getItem("btu_quiz_"+cu.key)||"null"),
            hist:JSON.parse(localStorage.getItem("btu_quiz_hist_"+cu.key)||"[]") });
        }
      } catch {}
      setUsers(list.sort((a,b)=>a.displayName.localeCompare(b.displayName)));
    } catch { setUsers([]); }
  };

  React.useEffect(()=>{ loadUsers(); }, [tick]);
  React.useEffect(()=>{
    const h=()=>setTick(n=>n+1);
    window.addEventListener("btu_quiz_done",h);
    return ()=>window.removeEventListener("btu_quiz_done",h);
  },[]);
  // Close on Escape
  React.useEffect(()=>{
    const h=e=>{ if(e.key==="Escape") onLeave(); };
    window.addEventListener("keydown",h);
    return ()=>window.removeEventListener("keydown",h);
  },[]);

  const deleteUser = (key, name) => {
    if (!window.confirm('Profil "'+name+'" wirklich lГ¶schen?')) return;
    // Supabase (cascade deletes favorites + quiz_results)
    SB.del("profiles", "id=eq." + encodeURIComponent(key));
    // localStorage cleanup
    try {
      Object.keys(localStorage).filter(k=>k.endsWith("_"+key)||k==="btu_quiz_"+key||k==="btu_favs_"+key||k==="btu_quiz_hist_"+key)
        .forEach(k=>localStorage.removeItem(k));
      const cu=JSON.parse(localStorage.getItem("btu_user")||"null");
      if(cu&&cu.key===key) localStorage.removeItem("btu_user");
      setExpanded(null); loadUsers();
    } catch {}
  };

  const startEditUser = u => {
    setEditingUserId(u.key);
    setEditUserFields({ first: u.firstName, last: u.lastName });
    setEditUserMsg("");
  };

  const saveEditUser = u => {
    const fn = editUserFields.first.trim().toLowerCase().replace(/\s+/g,"");
    const ln = editUserFields.last.trim().toLowerCase().replace(/\s+/g,"_");
    if (!fn) { setEditUserMsg("Vorname fehlt."); return; }
    const newKey = fn+(ln?"_"+ln:"");
    if (newKey === u.key) { setEditingUserId(null); return; }
    if (users.find(x=>x.key===newKey)) { setEditUserMsg("Name bereits vergeben."); return; }
    const newFirst = editUserFields.first.trim();
    const newLast  = editUserFields.last.trim();
    try {
      // Supabase: insert new profile, migrate data, delete old
      const favs = u.favs || [];
      const quizRow = u.quiz ? {
        profile_id: newKey,
        best_pct: u.quiz.best || 0,
        last_pct: u.quiz.last || 0,
        count: u.quiz.count || 0,
        history: u.hist || [],
        updated_at: new Date().toISOString()
      } : null;
      SB.upsert("profiles", { id: newKey, first_name: newFirst, last_name: newLast });
      if (favs.length) SB.upsert("favorites", { profile_id: newKey, product_ids: favs, updated_at: new Date().toISOString() });
      if (quizRow) SB.upsert("quiz_results", quizRow);
      SB.del("profiles", "id=eq." + encodeURIComponent(u.key));
      // localStorage migration
      const migrations = [
        ["btu_favs_"+u.key, "btu_favs_"+newKey],
        ["btu_quiz_"+u.key, "btu_quiz_"+newKey],
        ["btu_quiz_hist_"+u.key, "btu_quiz_hist_"+newKey],
      ];
      migrations.forEach(([oldK, newK]) => {
        const val = localStorage.getItem(oldK);
        if (val !== null) { localStorage.setItem(newK, val); localStorage.removeItem(oldK); }
      });
      const cu = JSON.parse(localStorage.getItem("btu_user")||"null");
      if (cu && cu.key === u.key) {
        cu.key = newKey;
        cu.first = newFirst[0].toUpperCase() + newFirst.slice(1);
        cu.last = newLast ? newLast[0].toUpperCase() + newLast.slice(1) : "";
        localStorage.setItem("btu_user", JSON.stringify(cu));
      }
      setEditingUserId(null); setExpanded(newKey);
      setTimeout(loadUsers, 500); // slight delay for Supabase consistency
    } catch { setEditUserMsg("Fehler beim Speichern."); }
  };

  const saveNewProduct = () => {
    const name = newProd.name.trim();
    if (!name) { setNewProdMsg("Name fehlt."); return; }
    const cat = newProd.categoryCustom.trim() || newProd.category;
    const price = parseFloat(String(newProd.price).replace(",",".")) || 0;
    const priceRange = price < 20 ? "вӮ¬" : price < 60 ? "вӮ¬вӮ¬" : "вӮ¬вӮ¬вӮ¬";
    const newId = "c_" + Date.now();
    const prod = {
      id: newId, custom: true,
      name, category: cat,
      subcategory: newProd.subcategory.trim(),
      price, priceRange,
      packageSize: newProd.packageSize.trim() || "вҖ“",
      portionSize: newProd.portionSize.trim() || "вҖ“",
      kcalPortion: newProd.kcalPortion ? Number(newProd.kcalPortion) : "вҖ“",
      proteinPortion: newProd.proteinPortion.trim() || "вҖ“",
      fatPortion: newProd.fatPortion.trim() || "вҖ“",
      carbsPortion: newProd.carbsPortion.trim() || "вҖ“",
      vegan: newProd.vegan,
      freeFrom: [],
      keyIngredients: [],
      flavors: newProd.flavors.trim() || "вҖ“",
      dosage: "вҖ“",
      notes: newProd.notes.trim(),
      studies: [],
    };
    try {
      const existing = JSON.parse(localStorage.getItem("btu_custom_products")||"[]");
      existing.push(prod);
      localStorage.setItem("btu_custom_products", JSON.stringify(existing));
      SB.setConfig("custom_products", existing);
      PRODUCTS.push(prod);
      setCustomProds(existing);
      setNewProd(EMPTY_PROD);
      setNewProdOpen(false);
      setNewProdMsg("вң“ "+name+" hinzugefГјgt.");
      setCustomTick(n=>n+1);
      setTimeout(()=>setNewProdMsg(""),3000);
    } catch { setNewProdMsg("Fehler beim Speichern."); }
  };

  const deleteCustomProduct = (id, name) => {
    if (!window.confirm('"'+name+'" wirklich lГ¶schen?')) return;
    try {
      const existing = JSON.parse(localStorage.getItem("btu_custom_products")||"[]");
      const nextItem = existing.filter(p=>p.id!==id);
      localStorage.setItem("btu_custom_products", JSON.stringify(next));
      SB.setConfig("custom_products", next);
      const idx = PRODUCTS.findIndex(p=>p.id===id);
      if (idx>-1) PRODUCTS.splice(idx,1);
      setCustomProds(next);
      setCustomTick(n=>n+1);
    } catch {}
  };

  const createProfile = () => {
    const fn = createFirst.trim().toLowerCase().replace(/\s+/g,"");
    const ln = createLast.trim().toLowerCase().replace(/\s+/g,"_");
    if (!fn) { setCreateMsg("Vorname fehlt."); return; }
    const key = fn+(ln?"_"+ln:"");
    if (users.find(u=>u.key===key)) { setCreateMsg("Existiert bereits."); return; }
    const firstName = createFirst.trim();
    const lastName  = createLast.trim();
    // Supabase
    SB.upsert("profiles", { id: key, first_name: firstName, last_name: lastName });
    SB.upsert("favorites", { profile_id: key, product_ids: [], updated_at: new Date().toISOString() });
    // localStorage fallback
    try { localStorage.setItem("btu_favs_"+key,"[]"); } catch {}
    setCreateFirst(""); setCreateLast("");
    setCreateMsg("вң“ "+firstName+" "+lastName+" erstellt.");
    setTimeout(loadUsers, 500);
    setTimeout(()=>setCreateMsg(""),3000);
  };

  const getFavNames = ids => (ids||[]).map(id=>{ const p=PRODUCTS.find(x=>x.id===id); return p?p.name:"#"+id; });
  const cap = pct => Math.min(100,pct||0);
  const scoreColor = pct => cap(pct)>=80?"#4ade80":cap(pct)>=60?"#fbbf24":"#f87171";
  const scoreBg    = pct => cap(pct)>=80?"rgba(74,222,128,.15)":cap(pct)>=60?"rgba(251,191,36,.15)":"rgba(248,113,113,.15)";

  const edProds = PRODUCTS.filter(p=>!p.refOnly && edSearch.length>1 && p.name.toLowerCase().includes(edSearch.toLowerCase())).slice(0,10);
  const startEdit = p => {
    const ov=overrides[p.id]||{};
    setEditingId(p.id);
    setEditFields({ name:ov.name!==undefined?ov.name:p.name, kcalPortion:ov.kcalPortion!==undefined?ov.kcalPortion:(p.kcalPortion||""),
      proteinPortion:ov.proteinPortion!==undefined?ov.proteinPortion:(p.proteinPortion||""),
      price:ov.price!==undefined?ov.price:(p.price||""), notes:ov.notes!==undefined?ov.notes:(p.notes||"") });
  };
  const saveEdit = pid => {
    const orig=PRODUCTS.find(p=>p.id===pid); const clean={};
    if(orig){
      if(editFields.name!==orig.name) clean.name=editFields.name;
      if(String(editFields.kcalPortion)!==String(orig.kcalPortion||"")) clean.kcalPortion=editFields.kcalPortion;
      if(String(editFields.proteinPortion)!==String(orig.proteinPortion||"")) clean.proteinPortion=editFields.proteinPortion;
      if(String(editFields.price)!==String(orig.price||"")) clean.price=editFields.price;
      if(editFields.notes!==(orig.notes||"")) clean.notes=editFields.notes;
    }
    const nextItem={...overrides}; if(Object.keys(clean).length) nextItem[pid]=clean; else delete nextItem[pid];
    localStorage.setItem("btu_product_overrides",JSON.stringify(next));
    SB.setConfig("product_overrides", next);
    setOverrides(next); setEditingId(null);
    setSavedMsg("вң“ Gespeichert"); setTimeout(()=>setSavedMsg(""),3000);
  };
  const resetOv = pid => {
    const nextItem={...overrides}; delete nextItem[pid];
    localStorage.setItem("btu_product_overrides",JSON.stringify(next));
    SB.setConfig("product_overrides", next);
    setOverrides(next); setEditingId(null);
  };
  const hasOv = pid=>overrides[pid]&&Object.keys(overrides[pid]).length>0;

  const FONT_SYS = FONT;
  const INP = { background:"#1e1e1e", color:"#e0e0e0", border:"1px solid #2a2a2a", borderRadius:7,
