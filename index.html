<script>
(function(){
  var trigger = document.getElementById('btu-sidebar-trigger');
  var sidebar = document.getElementById('btu-sidebar');
  var body = document.getElementById('btu-sidebar-body');
  var timer = null;

  function open(){ sidebar.classList.add('open'); }
  function close(){ sidebar.classList.remove('open'); }

  trigger.addEventListener('mouseenter', open);
  sidebar.addEventListener('mouseleave', function(){ timer=setTimeout(close,200); });
  sidebar.addEventListener('mouseenter', function(){ clearTimeout(timer); });
  trigger.addEventListener('mouseleave', function(){ timer=setTimeout(close,300); });

  function makeBtn(text, onClick, isActive) {
    var btn = document.createElement('button');
    btn.className = 'btu-filter-btn' + (isActive?' active':'');
    btn.textContent = text;
    btn.addEventListener('click', function(){ onClick(); setTimeout(buildMenu,100); });
    return btn;
  }

  function buildMenu() {
    body.innerHTML = '';

    // SUCHE
    var searchTitle = document.createElement('div');
    searchTitle.className = 'btu-section-title';
    searchTitle.textContent = 'Suche';
    body.appendChild(searchTitle);

    var searchWrap = document.createElement('div');
    searchWrap.id = 'btu-search-wrap';
    var input = document.createElement('input');
    input.type = 'text';
    input.placeholder = 'Produkt suchen...';
    var realInput = document.querySelector('input[type="text"]');
    if (realInput) {
      input.value = realInput.value;
      input.addEventListener('input', function(){ realInput.value = this.value; realInput.dispatchEvent(new Event('input', {bubbles:true})); });
    }
    searchWrap.appendChild(input);
    body.appendChild(searchWrap);

    // Sammle alle Buttons aus den ausgeblendeten Leisten
    var allBtns = document.querySelectorAll('button');
    
    // FILTER-BUTTONS (Kundentyp, Diдt-Filter etc.)
    var filterBtns = [];
    var catBtns = [];
    
    allBtns.forEach(function(btn){
      var fk = Object.keys(btn).find(function(k){ return k.startsWith('__reactFiber'); });
      if (!fk) return;
      var props = btn[fk] && btn[fk].memoizedProps;
      if (!props || !props.onClick) return;
      var onClickStr = props.onClick.toString();
      var text = btn.textContent.trim();
      if (!text || text.length > 40) return;
      
      if (onClickStr.includes('setActiveCategory')) {
        catBtns.push({text: text, btn: btn, active: btn.style && (btn.style.background === 'rgb(200, 16, 46)' || btn.style.fontWeight === '700')});
      } else if (onClickStr.includes('setDietFilter') || onClickStr.includes('setShowFavsOnly') || onClickStr.includes('showFavsOnly')) {
        filterBtns.push({text: text, btn: btn, active: btn.style && btn.style.borderColor === 'rgb(200, 16, 46)'});
      }
    });

    // DIДT FILTER SEKTION
    if (filterBtns.length > 0) {
      var div1 = document.createElement('div');
      div1.className = 'btu-divider';
      body.appendChild(div1);
      var ft = document.createElement('div');
      ft.className = 'btu-section-title';
      ft.textContent = 'Filter';
      body.appendChild(ft);
      filterBtns.forEach(function(item){
        var isActive = item.btn.style.borderColor === 'rgb(200, 16, 46)' || 
                       item.btn.style.background === 'rgb(200, 16, 46)';
        body.appendChild(makeBtn(item.text, function(){ item.btn.click(); close(); }, isActive));
      });
    }

    // KATEGORIEN SEKTION
    if (catBtns.length > 0) {
      var div2 = document.createElement('div');
      div2.className = 'btu-divider';
      body.appendChild(div2);
      var ct = document.createElement('div');
      ct.className = 'btu-section-title';
      ct.textContent = 'Kategorien';
      body.appendChild(ct);
      catBtns.forEach(function(item){
        var isActive = item.btn.style.background === 'rgb(200, 16, 46)' ||
                       item.btn.style.background === '#c8102e' ||
                       item.btn.style.fontWeight === '700';
        body.appendChild(makeBtn(item.text, function(){ item.btn.click(); close(); }, isActive));
      });
    }
  }

  // Beim Oeffnen Menь aufbauen
  trigger.addEventListener('mouseenter', function(){ setTimeout(buildMenu,50); });
  // Einmal nach Load
  setTimeout(buildMenu, 2000);
})();
</script>

(function(){

  var _iv=null,_s=false;
  function showToast(){if(_s)return;_s=true;
    var t=document.createElement("div");
    t.style.cssText="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:14px 20px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:99999;display:flex;align-items:center;gap:12px;font-family:sans-serif;font-size:14px;min-width:300px;";
    var cd=10;
    t.innerHTML="<span>Neue Version verfuegbar &ndash; Reload in <b id='btu-cd'>"+cd+"</b>s</span>"
      +"<button id='btu-nb' style='background:#e63946;border:none;color:#fff;padding:6px 14px;border-radius:8px;cursor:pointer;font-weight:600;'>Jetzt</button>"
      +"<button id='btu-sb' style='background:transparent;border:1px solid #555;color:#aaa;padding:6px 10px;border-radius:8px;cursor:pointer;font-size:12px;'>Spaeter</button>";
    document.body.appendChild(t);
    document.getElementById("btu-nb").onclick=function(){location.reload(true);};
    document.getElementById("btu-sb").onclick=function(){document.body.removeChild(t);_s=false;clearInterval(_iv);};
    var tmr=setInterval(function(){cd--;var el=document.getElementById("btu-cd");if(el)el.textContent=cd;if(cd<=0){clearInterval(tmr);location.reload(true);}},1000);
  }
  function check(){
    fetch("https://herbertprantl87-art.github.io/btuwdb/version.json?t="+Date.now())
    .then(function(r){return r.json();})
    .then(function(d){if(d&&d.sha&&d.sha!==window.__BTU_BUILD)showToast();})
    .catch(function(){});
  }
  setTimeout(function(){check();_iv=setInterval(check,21600000);},30000);
})();
</script>

function getGoalScore(p, goal) {
  let score = (GOAL_CAT_SCORES[goal] || {})[p.category] || 0;
  const allText = [p.name, p.subcategory, p.notes || "", ...(p.keyIngredients || []), p.flavors || ""].join(" ").toLowerCase();
  for (const kw of (GOAL_KEYWORDS[goal] || [])) {
    if (allText.includes(kw)) score = Math.min(score + 18, 100);
  }
  if (goal === "vegan") {
    const freeText = (p.freeFrom || []).join(" ").toLowerCase();
    if (allText.includes("vegan")) score += 90;
    else if (freeText.includes("laktose") && freeText.includes("gluten")) score += 40;
  }
  return Math.min(score, 100);
}

function strHash(str) {
  let h = 0;
  for (let i = 0; i < Math.min(str.length, 120); i++) {
    h = (h * 31 + str.charCodeAt(i)) >>> 0;
  }
  return h.toString(36);
}

  }
  // Restore all placeholders
  return result.replace(new RegExp(M + "(\\d+)" + M, "g"), (_, i) => placeholders[+i]);
}

function translateArraySync(arr, lang) {
  if (!arr || lang === "de") return arr;
  return arr.map(item => translateFieldSync(String(item), lang));
}

// ГўвҖқвӮ¬ГўвҖқвӮ¬ Synchrone Produkt-ГғЕ“bersetzung (kein API-Call mehr) ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬
function getProductTx(lang, product) {
  if (!product || lang === "de") return null;
  return {
    subcategory: translateFieldSync(product.subcategory, lang),
    notes: translateFieldSync(product.notes, lang),
    dosage: translateFieldSync(product.dosage, lang),
    flavors: translateFieldSync(product.flavors, lang),
    bcaa: translateFieldSync(product.bcaa, lang),
    warning: translateFieldSync(product.warning, lang),
    freeFrom: translateArraySync(product.freeFrom, lang),
    keyIngredients: translateArraySync(product.keyIngredients, lang),
    studies: (product.studies || []).map(s => ({
      ...s,
      finding: translateFieldSync(s.finding, lang),
    })),
    objections: (OBJECTIONS[product.id] || []).map(o => ({
      q: translateFieldSync(o.q, lang),
      a: translateFieldSync(o.a, lang),
    })),
  };
}

// Hook: gibt ГғВјbersetzte Produktfelder zurГғВјck (synchron, kein Loading-State mehr)
function useProductTx(lang, product) {
  return React.useMemo(() => getProductTx(lang, product), [lang, product?.id]);
}

function useTx(lang, text) {

}

function Tx({ lang, text, style, as: Tag = "span", className }) {

}

  if (range === "ГўвҖҡВ¬ГўвҖҡВ¬")  return { label: "Advanced",  bg: "#fef3c7", color: "#92400e", border: "#fcd34d" };
                       return { label: "Premium",   bg: "#fee2e2", color: "#991b1b", border: "#fca5a5" };
}

function stackPriceInfo(goalKey) {
  const combo = GOAL_COMBOS[goalKey];
  if (!combo) return null;
  const total = combo.stack.reduce((sum, s) => {
    const p = PRODUCTS.find(x => x.id === s.id);
    return sum + (p && p.price ? p.price : 0);
  }, 0);
  if (total < 58)  return { total, label: "Basic-Stack",   bg: "#d1fae5", color: "#065f46", border: "#6ee7b7" };
  if (total < 90)  return { total, label: "Advanced-Stack", bg: "#fef3c7", color: "#92400e", border: "#fcd34d" };
                   return { total, label: "Premium-Stack",  bg: "#fee2e2", color: "#991b1b", border: "#fca5a5" };
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

  // ГўвҖқвӮ¬ГўвҖқвӮ¬ BMI / TDEE CALC ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬
  function calcBMI() {
    var wMap = {'<60kg':57,'60-75kg':67,'75-90kg':82,'90+kg':95};
    var hMap = {'<150cm':148,'150-165cm':157,'165-175cm':170,'175-185cm':180,'185+cm':188};
    var aMap = {'16-20':18,'20-30':25,'30-40':35,'40-50':45,'50+':55};
    var actMap = {'1-2x':1.375,'3-4x':1.55,'5-6x':1.725,'daily':1.9};
    var w = wMap[(answers.weight||['75-90kg'])[0]] || 80;
    var h = hMap[(answers.height||['175-185cm'])[0]] || 178;
    var a = aMap[(answers.age||['20-30'])[0]] || 28;
    var g = (answers.gender||['male'])[0];
    var freq = actMap[(answers.trainingFrequency||['3-4x'])[0]] || 1.55;
    var bmi = Math.round((w / ((h/100)*(h/100)))*10)/10;
    var bmiCat = bmi < 18.5 ? (lang==='en'?'Underweight':'Untergewicht')
               : bmi < 25   ? (lang==='en'?'Normal weight':'Normalgewicht')
               : bmi < 30   ? (lang==='en'?'Overweight':'ГғЕ“bergewicht')
               :               (lang==='en'?'Obese':'Adipositas');
    var bmr = g === 'female'
      ? Math.round(10*w + 6.25*h - 5*a - 161)
      : Math.round(10*w + 6.25*h - 5*a + 5);
    var tdee = Math.round(bmr * freq);
    var goals = answers.sportsGoal || [];
    var hasFatLoss = goals.indexOf('fatLoss') >= 0 || goals.indexOf('definition') >= 0;
    var hasMuscle  = goals.indexOf('muscleBuilding') >= 0 || goals.indexOf('strength') >= 0;
    return { w:w, h:h, a:a, bmi:bmi, bmiCat:bmiCat, bmr:bmr, tdee:tdee,
             fatKcal: tdee - 500, muscleKcal: tdee + 300,
             hasFatLoss:hasFatLoss, hasMuscle:hasMuscle };
  }

  function calcMacros(data) {
    var kcal = data.hasMuscle ? data.muscleKcal : data.hasFatLoss ? data.fatKcal : data.tdee;
    var protG  = Math.round(data.w * 2);
    var protKcal = protG * 4;
    var fatKcal  = Math.round(kcal * 0.28);
    var fatG     = Math.round(fatKcal / 9);
    var carbKcal = kcal - protKcal - fatKcal;
    var carbG    = Math.round(carbKcal / 4);
    return { kcal:kcal, protG:protG, protPct:Math.round(protKcal/kcal*100),
             carbG:carbG, carbPct:Math.round(carbKcal/kcal*100),
             fatG:fatG, fatPct:Math.round(fatKcal/kcal*100) };
  }

  // ГўвҖқвӮ¬ГўвҖқвӮ¬ SCORING ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬
  function calcResults() {
    var allIds = [];
    Object.keys(answers).forEach(function(k){ (answers[k]||[]).forEach(function(v){ allIds.push(v); }); });
    var allergies = answers['allergies'] || [];
    var allergyFilter = ['none','lactose','gluten','vegan','nuts','egg'];
    var scoringIds = allIds.filter(function(a){ return allergyFilter.indexOf(a) < 0; });

    var hasFatGoal    = scoringIds.indexOf('fatLoss')>=0 || scoringIds.indexOf('definition')>=0;
    var hasMuscleGoal = scoringIds.indexOf('muscleBuilding')>=0 || scoringIds.indexOf('strength')>=0;
    var hasEndurance  = scoringIds.indexOf('endurance')>=0;
    var wantsVegan    = allergies.indexOf('vegan')>=0;

    var filtered = products.filter(function(p) {
      if (!allergies.length || allergies.indexOf('none') >= 0) return true;
      var ff = p.freeFrom || [];
      if (allergies.indexOf('vegan') >= 0 && !p.vegan) return false;
      if (allergies.indexOf('lactose') >= 0 && ff.indexOf('Laktose') < 0 && !p.vegan) return false;
      if (allergies.indexOf('gluten') >= 0 && ff.indexOf('Gluten') < 0) return false;
      if (allergies.indexOf('nuts') >= 0 && ff.indexOf('NГғВјsse') < 0) return false;
      if (allergies.indexOf('egg') >= 0 && ff.indexOf('Ei') < 0) return false;
      return true;
    });

    var scored = filtered.map(function(p) {
      var cats = BERAT_CAT_MAP[p.category] || [];
      var score = 0;
      scoringIds.forEach(function(aid) {
        BERAT_RULES.forEach(function(rule) {
          if (rule.answerId===aid && rule.targetType==='category' && cats.indexOf(rule.targetValue)>=0)
            score += rule.weight;
        });
      });

      // Subcategory bonus
      var sub = (p.subcategory || '').toLowerCase();
      var isIsolat  = sub.indexOf('isolat')>=0 || sub.indexOf('hydrolysat')>=0;
      var isClear   = sub.indexOf('clear')>=0 || sub.indexOf('fruchtig')>=0;
      var isKonz    = sub.indexOf('konzentrat')>=0 && sub.indexOf('isolat')<0;
      var isCasein  = sub.indexOf('casein')>=0;
      var isBeef    = sub.indexOf('rindfleisch')>=0 || sub.indexOf('beef')>=0;
      var isVeganP  = p.vegan === true;
      var isGainer  = sub.indexOf('gainer')>=0 || sub.indexOf('mass')>=0;
      var isEAA     = sub.indexOf('eaa')>=0 || sub.indexOf('essenziell')>=0;
      var isBCAA    = sub.indexOf('bcaa')>=0;
      var isThermo  = sub.indexOf('thermo')>=0 || sub.indexOf('burner')>=0;
      var isCarni   = sub.indexOf('carnitin')>=0;

      if (p.category === 'Protein') {
        if (hasFatGoal)    { if(isIsolat||isClear) score+=0.5; if(isKonz) score-=0.25; if(isCasein) score-=0.3; if(isBeef) score+=0.15; }
        if (hasMuscleGoal) { if(isIsolat) score+=0.25; if(isKonz||isGainer) score+=0.1; if(isCasein) score+=0.1; }
        if (hasEndurance)  { if(isIsolat||isClear) score+=0.2; }
        if (wantsVegan)    { if(isVeganP) score+=0.4; else score-=0.5; }
      }
      if (p.category === 'AminosГғВӨuren' || p.category === 'L-Carnitin') {
        if (hasMuscleGoal && isEAA)  score+=0.3;
        if (hasMuscleGoal && isBCAA) score+=0.2;
        if (hasFatGoal && isCarni)   score+=0.25;
        if (hasMuscleGoal && isCarni) score-=0.1;
      }
      if (p.category === 'Fettverbrenner' || p.category === 'Gewichtsmanagement') {
        if (hasFatGoal && isThermo) score+=0.3;
        if (hasFatGoal && isCarni)  score+=0.2;
      }

      var np = {}; Object.keys(p).forEach(function(k){ np[k]=p[k]; }); np._score=score;
      return np;
    });

    // Group by category ГўвӮ¬вҖң all candidates per slot, sorted by score
    var byCategory = {};
    scored.forEach(function(p) {
      if (p._score <= 0) return;
      if (!byCategory[p.category]) byCategory[p.category] = [];
      byCategory[p.category].push(p);
    });
    Object.keys(byCategory).forEach(function(cat) {
      byCategory[cat].sort(function(a,b){ return b._score - a._score; });
    });

    return Object.values(byCategory)
      .sort(function(a,b){ return b[0]._score - a[0]._score; })
      .slice(0, 6);
  }

  // ГўвҖқвӮ¬ГўвҖқвӮ¬ PIE CHART (SVG) ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬ГўвҖқвӮ¬
  function PieChart(m) {
    var size = 120, cx = 60, cy = 60, r = 50;
    var slices = [
      { pct: m.protPct, color: '#4A90D9' },
      { pct: m.carbPct, color: '#2ECC71' },
      { pct: m.fatPct,  color: '#F5A623' }
    ];
    var paths = [];
    var startAngle = -Math.PI / 2;
    slices.forEach(function(s, i) {
      var angle = (s.pct / 100) * 2 * Math.PI;
      var endAngle = startAngle + angle;
      var x1 = cx + r * Math.cos(startAngle);
      var y1 = cy + r * Math.sin(startAngle);
      var x2 = cx + r * Math.cos(endAngle);
      var y2 = cy + r * Math.sin(endAngle);
      var large = angle > Math.PI ? 1 : 0;
      paths.push(React.createElement('path', {
        key: i,
        d: 'M'+cx+','+cy+' L'+x1+','+y1+' A'+r+','+r+' 0 '+large+',1 '+x2+','+y2+' Z',
        fill: s.color
      }));
      startAngle = endAngle;
    });
    return React.createElement('svg', { width: size, height: size, viewBox: '0 0 '+size+' '+size },
      paths
    );
  }

function AdminPanel({
  t, lang, FONT, FONT_COND, onDeleteAll, onLeave, productCount
}) {
  const [tab, setTab]               = React.useState("users");
  const [users, setUsers]           = React.useState([]);
  const [expandedUser, setExpanded] = React.useState(null);
  const [tick, setTick]             = React.useState(0);
  const [createFirst, setCreateFirst] = React.useState("");
  const [createLast,  setCreateLast]  = React.useState("");
  const [createMsg,   setCreateMsg]   = React.useState("");
  const [edSearch,    setEdSearch]    = React.useState("");
  const [editingId,   setEditingId]   = React.useState(null);
  const [editFields,  setEditFields]  = React.useState({});
  const [savedMsg,    setSavedMsg]    = React.useState("");
  const [editingUserId, setEditingUserId] = React.useState(null);
  const [editUserFields, setEditUserFields] = React.useState({ first: "", last: "" });
  const [editUserMsg, setEditUserMsg] = React.useState("");
  const EMPTY_PROD = { name:"", category:"Protein", categoryCustom:"", subcategory:"", price:"", packageSize:"", portionSize:"", kcalPortion:"", proteinPortion:"", fatPortion:"", carbsPortion:"", vegan:false, notes:"", flavors:"" };
  const [newProdOpen, setNewProdOpen] = React.useState(false);
  const [newProd, setNewProd] = React.useState(EMPTY_PROD);
  const [newProdMsg, setNewProdMsg] = React.useState("");
  const [customProds, setCustomProds] = React.useState(() => { try { return JSON.parse(localStorage.getItem("btu_custom_products")||"[]"); } catch { return []; } });
  const [customTick, setCustomTick] = React.useState(0);
  const [overrides,   setOverrides]   = React.useState(() => {
    try { return JSON.parse(localStorage.getItem("btu_product_overrides") || "{}"); } catch { return {}; }
  });

  const loadUsers = () => {
    // Primary: load from Supabase
    Promise.all([
      SB.get("profiles?select=id,first_name,last_name&order=first_name"),
      SB.get("favorites?select=profile_id,product_ids"),
      SB.get("quiz_results?select=profile_id,best_pct,last_pct,count,history")
    ]).then(([profiles, favRows, quizRows]) => {
      if (profiles && profiles.length > 0) {
        const list = profiles.map(p => {
          const favRow  = favRows  && favRows.find(f => f.profile_id === p.id);
          const quizRow = quizRows && quizRows.find(q => q.profile_id === p.id);
          const favs = (favRow && Array.isArray(favRow.product_ids)) ? favRow.product_ids : [];
          const quiz = quizRow ? { best: quizRow.best_pct, last: quizRow.last_pct, count: quizRow.count } : null;
          const hist = (quizRow && Array.isArray(quizRow.history)) ? quizRow.history : [];
          const fn = p.first_name || "";
          const ln = p.last_name  || "";
          return { key: p.id, displayName: (fn + " " + ln).trim() || p.id, firstName: fn, lastName: ln, favs, quiz, hist };
        });
        setUsers(list);
        return;
      }
      // Fallback: localStorage scan
      loadUsersLocal();
    }).catch(() => loadUsersLocal());
  };

  const loadUsersLocal = () => {
    try {
      const favKeys = Object.keys(localStorage).filter(k => k.startsWith("btu_favs_"));
      const list = favKeys.map(fk => {
        const key   = fk.replace("btu_favs_", "");
        const favs  = JSON.parse(localStorage.getItem(fk) || "[]");
        const quiz  = JSON.parse(localStorage.getItem("btu_quiz_" + key) || "null");
        const hist  = JSON.parse(localStorage.getItem("btu_quiz_hist_" + key) || "[]");
        const parts = key.split("_");
        const fn = parts[0] ? parts[0][0].toUpperCase() + parts[0].slice(1) : "";
        const ln = parts.slice(1).map(p => p[0].toUpperCase() + p.slice(1)).join(" ");
        return { key, displayName:(fn+" "+ln).trim()||key, firstName:fn, lastName:ln, favs, quiz, hist };
      });
      try {
        const cu = JSON.parse(localStorage.getItem("btu_user")||"null");
        if (cu && cu.key && !list.find(u=>u.key===cu.key)) {
          list.push({ key:cu.key, displayName:(cu.first+" "+cu.last).trim(),
            firstName:cu.first, lastName:cu.last, favs:[],
            quiz:JSON.parse(localStorage.getItem("btu_quiz_"+cu.key)||"null"),
            hist:JSON.parse(localStorage.getItem("btu_quiz_hist_"+cu.key)||"[]") });
        }
      } catch {}
      setUsers(list.sort((a,b)=>a.displayName.localeCompare(b.displayName)));
    } catch { setUsers([]); }
  };

  React.useEffect(()=>{ loadUsers(); }, [tick]);
  React.useEffect(()=>{
    const h=()=>setTick(n=>n+1);
    window.addEventListener("btu_quiz_done",h);
    return ()=>window.removeEventListener("btu_quiz_done",h);
  },[]);
  // Close on Escape
  React.useEffect(()=>{
    const h=e=>{ if(e.key==="Escape") onLeave(); };
    window.addEventListener("keydown",h);
    return ()=>window.removeEventListener("keydown",h);
  },[]);

  const deleteUser = (key, name) => {
    if (!window.confirm('Profil "'+name+'" wirklich lГғВ¶schen?')) return;
    // Supabase (cascade deletes favorites + quiz_results)
    SB.del("profiles", "id=eq." + encodeURIComponent(key));
    // localStorage cleanup
    try {
      Object.keys(localStorage).filter(k=>k.endsWith("_"+key)||k==="btu_quiz_"+key||k==="btu_favs_"+key||k==="btu_quiz_hist_"+key)
        .forEach(k=>localStorage.removeItem(k));
      const cu=JSON.parse(localStorage.getItem("btu_user")||"null");
      if(cu&&cu.key===key) localStorage.removeItem("btu_user");
      setExpanded(null); loadUsers();
    } catch {}
  };

  const startEditUser = u => {
    setEditingUserId(u.key);
    setEditUserFields({ first: u.firstName, last: u.lastName });
    setEditUserMsg("");
  };

  const saveEditUser = u => {
    const fn = editUserFields.first.trim().toLowerCase().replace(/\s+/g,"");
    const ln = editUserFields.last.trim().toLowerCase().replace(/\s+/g,"_");
    if (!fn) { setEditUserMsg("Vorname fehlt."); return; }
    const newKey = fn+(ln?"_"+ln:"");
    if (newKey === u.key) { setEditingUserId(null); return; }
    if (users.find(x=>x.key===newKey)) { setEditUserMsg("Name bereits vergeben."); return; }
    const newFirst = editUserFields.first.trim();
    const newLast  = editUserFields.last.trim();
    try {
      // Supabase: insert new profile, migrate data, delete old
      const favs = u.favs || [];
      const quizRow = u.quiz ? {
        profile_id: newKey,
        best_pct: u.quiz.best || 0,
        last_pct: u.quiz.last || 0,
        count: u.quiz.count || 0,
        history: u.hist || [],
        updated_at: new Date().toISOString()
      } : null;
      SB.upsert("profiles", { id: newKey, first_name: newFirst, last_name: newLast });
      if (favs.length) SB.upsert("favorites", { profile_id: newKey, product_ids: favs, updated_at: new Date().toISOString() });
      if (quizRow) SB.upsert("quiz_results", quizRow);
      SB.del("profiles", "id=eq." + encodeURIComponent(u.key));
      // localStorage migration
      const migrations = [
        ["btu_favs_"+u.key, "btu_favs_"+newKey],
        ["btu_quiz_"+u.key, "btu_quiz_"+newKey],
        ["btu_quiz_hist_"+u.key, "btu_quiz_hist_"+newKey],
      ];
      migrations.forEach(([oldK, newK]) => {
        const val = localStorage.getItem(oldK);
        if (val !== null) { localStorage.setItem(newK, val); localStorage.removeItem(oldK); }
      });
      const cu = JSON.parse(localStorage.getItem("btu_user")||"null");
      if (cu && cu.key === u.key) {
        cu.key = newKey;
        cu.first = newFirst[0].toUpperCase() + newFirst.slice(1);
        cu.last = newLast ? newLast[0].toUpperCase() + newLast.slice(1) : "";
        localStorage.setItem("btu_user", JSON.stringify(cu));
      }
      setEditingUserId(null); setExpanded(newKey);
      setTimeout(loadUsers, 500); // slight delay for Supabase consistency
    } catch { setEditUserMsg("Fehler beim Speichern."); }
  };

  const saveNewProduct = () => {
    const name = newProd.name.trim();
    if (!name) { setNewProdMsg("Name fehlt."); return; }
    const cat = newProd.categoryCustom.trim() || newProd.category;
    const price = parseFloat(String(newProd.price).replace(",",".")) || 0;
    const priceRange = price < 20 ? "ГўвҖҡВ¬" : price < 60 ? "ГўвҖҡВ¬ГўвҖҡВ¬" : "ГўвҖҡВ¬ГўвҖҡВ¬ГўвҖҡВ¬";
    const newId = "c_" + Date.now();
    const prod = {
      id: newId, custom: true,
      name, category: cat,
      subcategory: newProd.subcategory.trim(),
      price, priceRange,
      packageSize: newProd.packageSize.trim() || "ГўвӮ¬вҖң",
      portionSize: newProd.portionSize.trim() || "ГўвӮ¬вҖң",
      kcalPortion: newProd.kcalPortion ? Number(newProd.kcalPortion) : "ГўвӮ¬вҖң",
      proteinPortion: newProd.proteinPortion.trim() || "ГўвӮ¬вҖң",
      fatPortion: newProd.fatPortion.trim() || "ГўвӮ¬вҖң",
      carbsPortion: newProd.carbsPortion.trim() || "ГўвӮ¬вҖң",
      vegan: newProd.vegan,
      freeFrom: [],
      keyIngredients: [],
      flavors: newProd.flavors.trim() || "ГўвӮ¬вҖң",
      dosage: "ГўвӮ¬вҖң",
      notes: newProd.notes.trim(),
      studies: [],
    };
    try {
      const existing = JSON.parse(localStorage.getItem("btu_custom_products")||"[]");
      existing.push(prod);
      localStorage.setItem("btu_custom_products", JSON.stringify(existing));
      SB.setConfig("custom_products", existing);
      PRODUCTS.push(prod);
      setCustomProds(existing);
      setNewProd(EMPTY_PROD);
      setNewProdOpen(false);
      setNewProdMsg("ГўЕ“вҖң "+name+" hinzugefГғВјgt.");
      setCustomTick(n=>n+1);
      setTimeout(()=>setNewProdMsg(""),3000);
    } catch { setNewProdMsg("Fehler beim Speichern."); }
  };

  const deleteCustomProduct = (id, name) => {
    if (!window.confirm('"'+name+'" wirklich lГғВ¶schen?')) return;
    try {
      const existing = JSON.parse(localStorage.getItem("btu_custom_products")||"[]");
      const nextItem = existing.filter(p=>p.id!==id);
      localStorage.setItem("btu_custom_products", JSON.stringify(next));
      SB.setConfig("custom_products", next);
      const idx = PRODUCTS.findIndex(p=>p.id===id);
      if (idx>-1) PRODUCTS.splice(idx,1);
      setCustomProds(next);
      setCustomTick(n=>n+1);
    } catch {}
  };

  const createProfile = () => {
    const fn = createFirst.trim().toLowerCase().replace(/\s+/g,"");
    const ln = createLast.trim().toLowerCase().replace(/\s+/g,"_");
    if (!fn) { setCreateMsg("Vorname fehlt."); return; }
    const key = fn+(ln?"_"+ln:"");
    if (users.find(u=>u.key===key)) { setCreateMsg("Existiert bereits."); return; }
    const firstName = createFirst.trim();
    const lastName  = createLast.trim();
    // Supabase
    SB.upsert("profiles", { id: key, first_name: firstName, last_name: lastName });
    SB.upsert("favorites", { profile_id: key, product_ids: [], updated_at: new Date().toISOString() });
    // localStorage fallback
    try { localStorage.setItem("btu_favs_"+key,"[]"); } catch {}
    setCreateFirst(""); setCreateLast("");
    setCreateMsg("ГўЕ“вҖң "+firstName+" "+lastName+" erstellt.");
    setTimeout(loadUsers, 500);
    setTimeout(()=>setCreateMsg(""),3000);
  };

  const getFavNames = ids => (ids||[]).map(id=>{ const p=PRODUCTS.find(x=>x.id===id); return p?p.name:"#"+id; });
  const cap = pct => Math.min(100,pct||0);
  const scoreColor = pct => cap(pct)>=80?"#4ade80":cap(pct)>=60?"#fbbf24":"#f87171";
  const scoreBg    = pct => cap(pct)>=80?"rgba(74,222,128,.15)":cap(pct)>=60?"rgba(251,191,36,.15)":"rgba(248,113,113,.15)";

  const edProds = PRODUCTS.filter(p=>!p.refOnly && edSearch.length>1 && p.name.toLowerCase().includes(edSearch.toLowerCase())).slice(0,10);
  const startEdit = p => {
    const ov=overrides[p.id]||{};
    setEditingId(p.id);
    setEditFields({ name:ov.name!==undefined?ov.name:p.name, kcalPortion:ov.kcalPortion!==undefined?ov.kcalPortion:(p.kcalPortion||""),
      proteinPortion:ov.proteinPortion!==undefined?ov.proteinPortion:(p.proteinPortion||""),
      price:ov.price!==undefined?ov.price:(p.price||""), notes:ov.notes!==undefined?ov.notes:(p.notes||"") });
  };
  const saveEdit = pid => {
    const orig=PRODUCTS.find(p=>p.id===pid); const clean={};
    if(orig){
